<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Walker - Miniature Pinscher / Chihuahua</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="pupper" class="dog-wrapper face-left">
        <div class="dog">
            <div class="dog-body">
                <div class="dog-chest-patch"></div>
                <div class="dog-collar">
                    <div class="dog-tag"></div>
                </div>
                <div class="dog-head">
                    <div class="dog-eyebrow"></div>
                    <div class="dog-ear"></div>
                    <div class="dog-ear inner"></div>
                    <div class="dog-eye"></div>
                    <div class="dog-snout">
                        <div class="dog-nose"></div>
                    </div>
                </div>
                <div class="dog-tail"></div>
                <div class="leg front-left"><div class="tan-sock"></div></div>
                <div class="leg front-right"><div class="tan-sock"></div></div>
                <div class="leg back-left"><div class="tan-sock"></div></div>
                <div class="leg back-right"><div class="tan-sock"></div></div>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
